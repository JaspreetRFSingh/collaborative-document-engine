spring.application.name=collaborative-document-engine
server.port=8080
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/docengine}
spring.datasource.username=${DB_USERNAME:docengine}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.jpa.hibernate.ddl-auto=update
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
